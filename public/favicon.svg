  <path d="M16 11 C15 9 17 8 16 6" stroke="#d4c4a8" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  <path d="M21 11 C20 9 22 8 21 6" stroke="#d4c4a8" stroke-width="1.5" stroke-linecap="round" fill="none"/>

  <!-- Cup body (trapezoid) -->
